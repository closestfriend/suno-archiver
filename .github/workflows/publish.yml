name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) when a GitHub Release is
# published. No API token required — PyPI verifies the workflow's identity.
on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + deps
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -v

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify version matches the release tag
        run: |
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package=$PKG_VERSION tag=$TAG"
          test "$PKG_VERSION" = "$TAG" || { echo "::error::pyproject version ($PKG_VERSION) != release tag ($TAG)"; exit 1; }
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
